<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enable Guest Mode</title>
</head>
<body>
    <h1>Select Guest Mode Duration</h1>
    <form method="post">
        <label for="duration">Choose duration:</label><br>
        <input type="radio" id="30min" name="duration" value="30 minutes">
        <label for="30min">30 minutes</label><br>
        <input type="radio" id="2hours" name="duration" value="2 hours">
        <label for="2hours">2 hours</label><br>
        <input type="radio" id="1day" name="duration" value="1 day">
        <label for="1day">1 day</label><br><br>
        <input type="submit" value="Enable Guest Mode">
    </form>
</body>
</html>
